<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>병맛음악만드는뽀로로 의 미디 파일 다운로드</title>
  <!-- Google Fonts: Noto Sans KR -->
  <link href="https://fonts.googleapis.com/css?family=Noto+Sans+KR:400,700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      background-color: #007bff;
      color: white;
      text-align: center;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
    }
    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card h2 {
      margin-top: 0;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    .download-btn {
      display: inline-block;
      text-decoration: none;
      color: white;
      background-color: #28a745;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s;
      font-size: 1rem;
      font-weight: bold;
    }
    .download-btn:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>병맛음악만드는뽀로로 미디 파일 다운로드</h1>
    </header>
    <div class="card-list">
      <div class="card">
        <h2>러쉬 이 미디</h2>
        <a class="download-btn" href="https://musical-artifacts.com/artifacts/2960/rush_e_real.mid" download="러쉬 이 미디.mid">다운로드</a>
      </div>
      <div class="card">
        <h2>러쉬 이 3 미디</h2>
        <a class="download-btn" href="https://drive.usercontent.google.com/download?id=1pYcPvqo6NMSxe7QW3GFZukvEScBrDf0P&export=download&authuser=0&confirm=t&uuid=5b47bbb7-84c0-4059-9c99-7133217fc33f&at=ALoNOgnelXij9gGuGoWlzrSmxvPZ:1748603352750" download="러쉬 이 3 미디.mid">다운로드</a>
      </div>
      <div class="card">
        <h2>하하 송 미디</h2>
        <a class="download-btn" href="https://drive.usercontent.google.com/download?id=1MtEvWdkQ6U7da_SZiFTfGBad91ffyT0_&export=download&authuser=0" download="하하 송 미디.mid">다운로드</a>
      </div>
      <div class="card">
        <h2>미스터비스트 송</h2>
        <a class="download-btn" href="https://drive.usercontent.google.com/download?id=1yXKgwU6RoSDvs6WWG0q53_hVM7L5RjdN&export=download&authuser=0" download="미스터비스트 송.mid">다운로드</a>
      </div>
      <div class="card">
        <h2>타우 2 미디</h2>
        <a class="download-btn" href="https://drive.usercontent.google.com/download?id=16Eb7zvDvbv5njevhTnx5-JOPIErDOLQ0&export=download&authuser=0" download="타우 2 미디.mid">다운로드</a>
      </div>
    </div>
  </div>
</body>
</html>
