<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        a {
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .error-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .error-image {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404 - Page Not Found</h1>
        <img class="error-image" src="https://via.placeholder.com/300x200?text=404+Error" alt="404 Error">
        <p>Sorry, the page you are looking for does not exist or has been moved.</p>
        <p><a href="/">Return to Homepage</a></p>
    </div>
</body>
</html>
