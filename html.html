<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HTML 실행 및 저장 프로그램</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f5f5f5;
    }
    h1, h2 {
      color: #333;
    }
    textarea {
      width: 100%;
      height: 300px;
      font-family: Consolas, monospace;
      font-size: 14px;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      resize: vertical;
    }
    button {
      padding: 10px 20px;
      margin: 5px 2px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: #fff;
      border-radius: 4px;
    }
    button:hover {
      background-color: #45a049;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: 1px solid #ccc;
      background-color: #fff;
    }
  </style>
</head>
<body>
  <h1>HTML 실행 및 저장 프로그램</h1>
  <textarea id="htmlInput" placeholder="여기에 HTML 코드를 입력하세요.">
  </textarea>
  <br>
  <button id="runBtn">실행</button>
  <button id="saveBtn">저장</button>
  
  <h2>결과 미리보기</h2>
  <iframe id="preview"></iframe>

  <script>
    // 실행 버튼 클릭 시 textarea의 코드를 iframe에 적용
    document.getElementById('runBtn').addEventListener('click', function() {
      var htmlCode = document.getElementById('htmlInput').value;
      var iframe = document.getElementById('preview');
      var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      iframeDoc.open();
      iframeDoc.write(htmlCode);
      iframeDoc.close();
    });

    // 저장 버튼 클릭 시 textarea의 코드를 HTML 파일로 저장
    document.getElementById('saveBtn').addEventListener('click', function() {
      var htmlCode = document.getElementById('htmlInput').value;
      var blob = new Blob([htmlCode], { type: "text/html" });
      var link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "myPage.html";  // 저장될 파일명 지정
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>
</body>
</html>
