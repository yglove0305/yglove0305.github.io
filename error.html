<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yglove0305.github.io</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .main-page, .error-page {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .error-page {
            color: red;
        }
    </style>
    <script>
        // Error simulation for demonstration purposes
        function simulateError() {
            // Simulate an error (set to true to trigger the error page)
            return false; // Change to true to test the error page
        }

        window.addEventListener('load', function() {
            const isError = simulateError();

            if (isError) {
                document.querySelector('.error-page').style.display = 'block';
            } else {
                document.querySelector('.main-page').style.display = 'block';
            }
        });
    </script>
</head>
<body>
    <!-- Main Page Content -->
    <div class="main-page">
        <h1>Welcome to yglove0305.github.io</h1>
        <p>This is the main page content.</p>
    </div>

    <!-- Error Page Content -->
    <div class="error-page">
        <h1>Oops! Something went wrong.</h1>
        <p>We couldn't load the page you were looking for.</p>
        <p><a href="/">Go Back to Home</a></p>
    </div>
</body>
</html>
