<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yglove0305.github.io</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .main-page, .error-page {
            display: none;
        }
        .error-page {
            color: red;
        }
    </style>
    <script>
        // Check if the domain is reachable
        async function checkDomainAvailability(domain) {
            try {
                const response = await fetch(domain, { method: 'HEAD', mode: 'no-cors' });
                return response.ok || response.type === 'opaque'; // Domain is reachable
            } catch (error) {
                return false; // Domain is not reachable
            }
        }

        window.addEventListener('load', async function() {
            const domain = "https://yglove0305.github.io"; // Replace with your domain
            const isDomainAvailable = await checkDomainAvailability(domain);

            if (isDomainAvailable) {
                document.querySelector('.main-page').style.display = 'block';
            } else {
                document.querySelector('.error-page').style.display = 'block';
            }
        });
    </script>
</head>
<body>
    <!-- Main Page Content -->
    <div class="main-page">
        <h1>Welcome to yglove0305.github.io</h1>
        <p>This is the main page content. Everything is working fine!</p>
    </div>

    <!-- Error Page Content -->
    <div class="error-page">
        <h1>Oops! The domain is not reachable.</h1>
        <p>We couldn't load the page you were looking for.</p>
        <p><a href="/">Go Back to Home</a></p>
    </div>
</body>
</html>
