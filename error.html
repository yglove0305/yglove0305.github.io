<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yglove0305.github.io</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .main-page, .error-page {
            display: none;
        }
        .error-page {
            color: red;
        }
    </style>
    <script>
        // Error detection logic
        function checkForError() {
            // 여기에 실제 오류 감지 로직을 추가합니다.
            // 예: API 호출 실패, 필수 데이터 누락 등
            const simulatedError = false; // true로 변경하면 오류 페이지가 표시됩니다.
            return simulatedError;
        }

        window.addEventListener('load', function() {
            const isError = checkForError(); // 오류 감지 실행

            if (isError) {
                document.querySelector('.error-page').style.display = 'block';
            } else {
                document.querySelector('.main-page').style.display = 'block';
            }
        });
    </script>
</head>
<body>
    <!-- Main Page Content -->
    <div class="main-page">
        <h1>Welcome to yglove0305.github.io</h1>
        <p>This is the main page content. Everything is working fine!</p>
    </div>

    <!-- Error Page Content -->
    <div class="error-page">
        <h1>Oops! Something went wrong.</h1>
        <p>We encountered an error. Please try again later.</p>
        <p><a href="/">Go Back to Home</a></p>
    </div>
</body>
</html>
